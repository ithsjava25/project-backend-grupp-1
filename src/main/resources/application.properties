spring.application.name=project-backend-group-1

spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:project_dev}
spring.datasource.username=${DB_USERNAME:project}
spring.datasource.password=${DB_PASSWORD:project}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

spring.web.resources.cache.period=0
spring.web.resources.chain.cache=false

spring.thymeleaf.cache=false

storage.s3.endpoint=http://localhost:9000
storage.s3.region=us-east-1
storage.s3.access-key=minioadmin
storage.s3.secret-key=minioadmin
storage.s3.bucket=project-documents
storage.s3.path-style-access-enabled=true
storage.s3.max-download-size-bytes=${STORAGE_S3_MAX_DOWNLOAD_SIZE_BYTES:10485760}

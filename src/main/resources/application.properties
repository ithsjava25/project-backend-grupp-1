spring.application.name=project-backend-group-1

spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:project_dev}
spring.datasource.username=${DB_USERNAME:project}
spring.datasource.password=${DB_PASSWORD:project}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

storage.s3.endpoint=${STORAGE_S3_ENDPOINT:}
storage.s3.region=${STORAGE_S3_REGION:us-east-1}
storage.s3.access-key=${STORAGE_S3_ACCESS_KEY:}
storage.s3.secret-key=${STORAGE_S3_SECRET_KEY:}
storage.s3.bucket=${STORAGE_S3_BUCKET:project-documents}
storage.s3.path-style-access-enabled=${STORAGE_S3_PATH_STYLE:true}

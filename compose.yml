services:
  postgres:
    image: postgres:16
    container_name: project-backend-group-1-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-project_dev}
      POSTGRES_USER: ${POSTGRES_USER:-project}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-project}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-project} -d ${POSTGRES_DB:-project_dev}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
